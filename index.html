<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:black;
  color:white;
  overflow:hidden;
}

.screen{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{display:flex;}

button{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  z-index:2;
}

#intro{
  background:linear-gradient(135deg,#ff7eb3,#ff4f81);
}

#rain canvas{
  position:absolute;
  top:0;
  left:0;
  z-index:0;
  pointer-events:none;
}

video{
  width:260px;
  border-radius:15px;
}

.polaroid{
  background:white;
  padding:15px 15px 60px;
  border-radius:10px;
  transform:rotate(-2deg);
}

.polaroid img{
  width:250px;
}

.letter{
  max-width:500px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<section id="intro" class="screen active">
  <h1>Happy Birthday 🎉</h1>
  <button onclick="startRain()">next</button>
</section>

<section id="rain" class="screen">
  <canvas id="matrix"></canvas>
  <button onclick="showVideo()">next</button>
</section>

<section id="video" class="screen">
  <h2>🎵 Música</h2>
  <video src="video.mp4" controls autoplay muted loop playsinline></video>
  <button onclick="showPhoto()">next</button>
</section>

<section id="photo" class="screen">
  <div class="polaroid">
    <img src="foto.jpg">
  </div>
  <button onclick="showFinal()">next</button>
</section>

<section id="final" class="screen">
  <div class="letter">
    <h2>Feliz Aniversário ✨</h2>
    <p>
      Você é uma pessoa incrível e cheia de luz, obrigado por proporcionar vários momentos com você,
      que essa nova fase seja cheia de sonhos realizados e muita felicidade e muito amor,
      você é uma garota maravilhosa, obrigada pelos momentos inesquecíveis.
    </p>
  </div>
</section>

<script>
const screens = document.querySelectorAll('.screen');

function show(id){
  screens.forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let interval;

function startRain(){
  show('rain');
  startMatrix();
}

function startMatrix(){

  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const letters = "HAPPYBIRTHDAY";
  const fontSize = 20;
  const columns = canvas.width / fontSize;

  const drops = [];
  for(let x=0;x<columns;x++) drops[x]=1;

  let stage = 0;
  let counter = 3;
  let lastTime = Date.now();

  const nome = "MAÍSA";

  let particles = [];

  function createParticlesFromText(text){

    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    tempCtx.fillStyle = "red";
    tempCtx.font = "bold 130px Arial";
    tempCtx.textAlign = "center";
    tempCtx.fillText(text, canvas.width/2, canvas.height/2);

    const imageData = tempCtx.getImageData(0,0,canvas.width,canvas.height).data;

    particles = [];

    for(let y=0;y<canvas.height;y+=5){
      for(let x=0;x<canvas.width;x+=5){
        const index = (y*canvas.width + x)*4;
        if(imageData[index+3] > 128){
          particles.push({
            x: canvas.width/2,
            y: canvas.height/2,
            tx: x,
            ty: y
          });
        }
      }
    }
  }

  function draw(){

    ctx.fillStyle="rgba(0,0,0,0.1)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // MATRIX
    ctx.fillStyle="red";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
      const text=letters[Math.floor(Math.random()*letters.length)];
      ctx.fillText(text,i*fontSize,drops[i]*fontSize);

      if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
        drops[i]=0;
      }
      drops[i]++;
    }

    ctx.textAlign="center";

    // CONTAGEM
    if(stage === 0){

      ctx.fillStyle="red";
      ctx.shadowColor="red";
      ctx.shadowBlur=30;
      ctx.font="bold 120px Arial";

      ctx.fillText(counter, canvas.width/2, canvas.height/2);

      ctx.shadowBlur=0;

      if(Date.now()-lastTime > 1000){
        counter--;
        lastTime = Date.now();

        if(counter === 0){
          stage = 1;
          lastTime = Date.now();
        }
      }
    }

    // HAPPY BIRTHDAY
    else if(stage === 1){

      ctx.fillStyle="red";
      ctx.shadowColor="red";
      ctx.shadowBlur=25;
      ctx.font="bold 70px Arial";

      ctx.fillText("HAPPY", canvas.width/2, canvas.height/2 - 50);
      ctx.fillText("BIRTHDAY", canvas.width/2, canvas.height/2 + 50);

      ctx.shadowBlur=0;

      if(Date.now()-lastTime > 2000){
        createParticlesFromText(nome);
        lastTime = Date.now();
        stage = 2;
      }
    }

    // NOME
    else if(stage === 2){

      for(let p of particles){

        if(!p.vx){
          p.vx = (Math.random() - 0.5) * 20;
          p.vy = (Math.random() - 0.5) * 20;
        }

        if(Date.now() - lastTime < 500){
          p.x += p.vx;
          p.y += p.vy;
        } else {
          p.x += (p.tx - p.x) * 0.08;
          p.y += (p.ty - p.y) * 0.08;
        }

        ctx.fillStyle="red";
        ctx.shadowColor="red";
        ctx.shadowBlur=15;

        ctx.fillRect(p.x, p.y, 2.5, 2.5);
      }

      ctx.shadowBlur=0;

      if(Date.now() - lastTime > 2500){
        createParticlesFromText("01/04/2003");
        lastTime = Date.now();
        stage = 3;
      }
    }

    // DATA
    else if(stage === 3){

      for(let p of particles){

        if(!p.vx){
          p.vx = (Math.random() - 0.5) * 20;
          p.vy = (Math.random() - 0.5) * 20;
        }

        if(Date.now() - lastTime < 500){
          p.x += p.vx;
          p.y += p.vy;
        } else {
          p.x += (p.tx - p.x) * 0.08;
          p.y += (p.ty - p.y) * 0.08;
        }

        ctx.fillStyle="red";
        ctx.shadowColor="red";
        ctx.shadowBlur=15;

        ctx.fillRect(p.x, p.y, 2.5, 2.5);
      }

      ctx.shadowBlur=0;
    }

  }

  interval = setInterval(draw, 33);
}

function showVideo(){
  clearInterval(interval);
  show('video');
}

function showPhoto(){show('photo')}

function showFinal(){
  show('final');
  document.body.style.overflow='auto';
}
</script>

</body>
</html>
